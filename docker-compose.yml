x-shared-env:
  DOCKER_REGISTRY: &docker_registry ${DOCKER_REGISTRY}
  DOCKERHUB_NAMESPACE: &dockerhub_namespace ${DOCKERHUB_NAMESPACE}
  IMAGE_TAG: &image_tag ${IMAGE_TAG:-latest}
  HOST: &host ${HOST:-0.0.0.0}
  PORT: &port ${PORT:-3000}
  WEB_PORT: &web_port ${WEB_PORT:-4173}
  PROJECTS_ROOT: &projects_root ${PROJECTS_ROOT:-./data/projects}
  ASSET_REGISTRY_PATH: &asset_registry_path ${ASSET_REGISTRY_PATH:-./apps/server/data/asset-registry.json}
  AI_PROVIDER: &ai_provider ${AI_PROVIDER:-mock}
  AI_MODEL: &ai_model ${AI_MODEL:-gpt-4o-mini}
  OPENAI_API_KEY: &openai_api_key ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: &openai_base_url ${OPENAI_BASE_URL:-https://api.openai.com/v1}
  VITE_API_URL: &vite_api_url ${VITE_API_URL:-http://localhost:3000}

services:
  server:
    image: ${DOCKER_REGISTRY}/${DOCKERHUB_NAMESPACE}/ai-3d-modeling-server:${IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      HOST: *host
      PORT: *port
      PROJECTS_ROOT: /app/data/projects
      ASSET_REGISTRY_PATH: /app/apps/server/data/asset-registry.json
      AI_PROVIDER: *ai_provider
      AI_MODEL: *ai_model
      OPENAI_API_KEY: *openai_api_key
      OPENAI_BASE_URL: *openai_base_url
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - project_data:/app/data/projects
    restart: unless-stopped

  web:
    profiles: ['web']
    image: ${DOCKER_REGISTRY}/${DOCKERHUB_NAMESPACE}/ai-3d-modeling-web:${IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      VITE_API_URL: *vite_api_url
    depends_on:
      - server
    ports:
      - "${WEB_PORT:-4173}:4173"
    restart: unless-stopped

volumes:
  project_data:
